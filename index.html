<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
(function () {
  if (window.RisoonChatLoaderInitialized) return;
  window.RisoonChatLoaderInitialized = true;

  var button = document.createElement("button");
  button.id = "risoon-chat-launcher";
  button.setAttribute("aria-label", "فتح المحادثة");
  button.innerHTML = `
    <span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">💬</span>
    <span id="risoon-chat-badge" style="
      display:none;
      position:absolute;
      top:-4px;
      left:-2px;
      min-width:18px;
      height:18px;
      padding:0 5px;
      border-radius:999px;
      background:#ef4444;
      color:#fff;
      font-size:11px;
      font-weight:700;
      line-height:18px;
      text-align:center;
      box-shadow:0 4px 10px rgba(239,68,68,.35);
    ">1</span>
  `;

  Object.assign(button.style, {
    position: "fixed",
    bottom: "18px",
    right: "18px",
    width: "60px",
    height: "60px",
    borderRadius: "50%",
    border: "none",
    cursor: "pointer",
    zIndex: "999999",
    background: "linear-gradient(135deg, #2f6f57 0%, #3f8b6d 100%)",
    color: "#fff",
    fontSize: "24px",
    boxShadow: "0 14px 30px rgba(47,111,87,.28)",
    transition: "transform .2s ease, box-shadow .2s ease",
    padding: "0",
    overflow: "visible"
  });

  button.onmouseenter = function () {
    button.style.transform = "translateY(-2px)";
    button.style.boxShadow = "0 18px 34px rgba(47,111,87,.34)";
  };

  button.onmouseleave = function () {
    button.style.transform = "translateY(0)";
    button.style.boxShadow = "0 14px 30px rgba(47,111,87,.28)";
  };

  document.body.appendChild(button);

  function loadChatScript() {
    if (window.RisoonChatLoaded) {
      if (window.RisoonChatWidget && typeof window.RisoonChatWidget.toggle === "function") {
        window.RisoonChatWidget.toggle();
      }
      return;
    }

    var script = document.createElement("script");
    script.src = "https://dev7-mubarak.github.io/chatbot-template/risoon-chatbot.js";
    script.defer = true;

    script.onload = function () {
      window.RisoonChatLoaded = true;

      if (window.RisoonChatWidget && typeof window.RisoonChatWidget.init === "function") {
        window.RisoonChatWidget.init({
          webhookUrl: "https://YOUR-N8N-DOMAIN/webhook/chat",
          storeDomain: "{{store.domain}}",
          storeId: "{{store.id}}",
          customerId: "{{customer.id}}",
          customerName: "{{customer.name}}",
          customerEmail: "{{customer.email}}",
          customerMobile: "{{customer.mobile}}",
          brandName: "ريسون",
          assistantName: "مساعد ريسون",
          accentColor: "#2f6f57",
          accentColorSoft: "#eef7f3",
          position: "right",
          rtl: true,
          launcherId: "risoon-chat-launcher",
          showQuickActions: true
        });
      }
    };

    document.body.appendChild(script);
  }

  button.addEventListener("click", loadChatScript);
})();
</script>
<body>
    <h1>hi</h1>
</body>
</html>
